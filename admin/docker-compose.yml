version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: bolt-admin-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bolt_admin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bolt_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - bolt-admin-network

  # Admin Panel Backend
  admin-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bolt-admin-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bolt_admin
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-bolt_secure_password}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@openweb.live}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
    depends_on:
      - postgres
    ports:
      - "${ADMIN_PORT:-3001}:3001"
    volumes:
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DEFAULT_SSH_KEY_PATH:-/root/.ssh/id_rsa}:/root/.ssh/id_rsa:ro
    networks:
      - bolt-admin-network

  # Admin Panel Frontend (Optional - can be served by backend)
  admin-frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: bolt-admin-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://admin-backend:3001
    depends_on:
      - admin-backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - bolt-admin-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: bolt-admin-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    networks:
      - bolt-admin-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: bolt-admin-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - admin-frontend
      - admin-backend
    networks:
      - bolt-admin-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  bolt-admin-network:
    driver: bridge